{{ if .Values.multiCluster }}
---
# ClusterRole for read-only access to all resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: miner
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/status"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets"]
    verbs: ["get", "list", "watch", "patch"]

---
# ClusterRoleBinding for read-only access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: miner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: miner
subjects:
  - kind: User
    name: miner
    apiGroup: rbac.authorization.k8s.io

---
# Role for write access to specific resources in chutes namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: miner
  namespace: chutes
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log", "pods/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["miner-credentials"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# RoleBinding for write access in chutes namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: miner
  namespace: chutes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: miner
subjects:
  - kind: User
    name: miner
    apiGroup: rbac.authorization.k8s.io

---
# Role for read-only + log access in gpu-operator namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: miner
  namespace: gpu-operator
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log", "pods/status"]
    verbs: ["get"]

---
# RoleBinding for gpu-operator namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: miner
  namespace: gpu-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: miner
subjects:
  - kind: User
    name: miner
    apiGroup: rbac.authorization.k8s.io
{{- end }}